name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Mise
        uses: jdx/mise-action@v2

      - name: Install Tuist
        run: mise install tuist
      
      - name: Install Dependencies
        working-directory: CCGateWay
        run: mise exec -- tuist install

      - name: Generate Xcode Project
        working-directory: CCGateWay
        run: mise exec -- tuist generate

      - name: Build Release
        working-directory: CCGateWay
        run: |
          xcodebuild -workspace CCGateWay.xcworkspace \
            -scheme CCGateWay \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            build

      - name: Re-sign App Bundle
        working-directory: CCGateWay
        run: |
          APP_PATH=$(find ./build/Build/Products/Release -name "CCGateWay.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          # Re-sign all embedded frameworks first, then the main app
          # This ensures all binaries share the same ad-hoc identity (no Team ID mismatch)
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            echo "Signing embedded frameworks..."
            find "$APP_PATH/Contents/Frameworks" -name "*.framework" -o -name "*.dylib" | while read fw; do
              echo "  Signing: $fw"
              codesign --force --sign - --timestamp=none "$fw"
            done
          fi

          echo "Signing main app bundle..."
          codesign --force --sign - --timestamp=none "$APP_PATH"

          echo "Verifying signature..."
          codesign --verify --deep --verbose=2 "$APP_PATH"

      - name: Package App
        working-directory: CCGateWay
        run: |
          APP_PATH=$(find ./build/Build/Products/Release -name "CCGateWay.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          mkdir -p ./release
          cp -R "$APP_PATH" ./release/
          cd release
          zip -r ../CCGateWay.zip "CCGateWay.app"
          cd ..
          
          # Generate SHA256
          shasum -a 256 CCGateWay.zip | tee sha256.txt
          echo "SHA256=$(shasum -a 256 CCGateWay.zip | awk '{print $1}')" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CCGateWay/CCGateWay.zip
            CCGateWay/sha256.txt
          body: |
            ## CCGateWay ${{ github.ref_name }}
            
            ### Install via Homebrew
            ```bash
            brew tap skainguyen1412/tap
            brew install --cask ccgateway
            ```
            
            ### SHA256
            `${{ env.SHA256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating homebrew-tap to version $VERSION with SHA256 $SHA256"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/skainguyen1412/homebrew-tap.git /tmp/homebrew-tap

          cat > /tmp/homebrew-tap/Casks/ccgateway.rb << 'CASK_EOF'
          cask "ccgateway" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/skainguyen1412/claude-code-gateway/releases/download/v#{version}/CCGateWay.zip"
            name "CCGateWay"
            desc "Use Claude Code with any LLM — one click from your Mac menu bar"
            homepage "https://github.com/skainguyen1412/claude-code-gateway"

            depends_on macos: ">= :sonoma"

            postflight do
              system "xattr", "-d", "com.apple.quarantine", "#{appdir}/CCGateWay.app"
            end

            app "CCGateWay.app"

            zap trash: [
              "~/Library/Application Support/CCGateWay",
              "~/.ccgateway",
            ]
          end
          CASK_EOF

          # Replace placeholders with actual values
          sed -i '' "s/VERSION_PLACEHOLDER/$VERSION/g" /tmp/homebrew-tap/Casks/ccgateway.rb
          sed -i '' "s/SHA256_PLACEHOLDER/$SHA256/g" /tmp/homebrew-tap/Casks/ccgateway.rb

          # Fix indentation (heredoc adds extra spaces)
          sed -i '' 's/^          //' /tmp/homebrew-tap/Casks/ccgateway.rb

          echo "--- Generated cask file ---"
          cat /tmp/homebrew-tap/Casks/ccgateway.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ccgateway.rb
          git commit -m "Update CCGateWay to v$VERSION"
          git push
